<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        * {
            box-sizing: border-box;
            background-color: #f5f5f5;
            color: #333;
        }

        body {
            margin: 0;
            padding: 20px;

        }

        .demo-section {
            margin-bottom: 40px;
        }

        .demo-section h2.content {
            border: 1px solid red;
            width: 100px;
            height: 100px;
            padding: 10px;
            margin-left: 100px;
        }

        .demo-section h2.units {
            border: 1px solid red;
            width: 100vmin;
            height: 100vmin;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .product-card {
            border: 2px solid gray;
            width: 200px;
            padding: 20px;
            border-radius: 6px;
            background-color: white;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }


        .product-card img {
            width: 80%;
            height: auto;
            margin-bottom: 10px;
            display: block;
        }


        .product-card .product-name {
            font-size: 1.1rem;
            margin: 0 0 8px;
        }

        .product-card .product-price{
            color: green;
            font-weight: bold;
            margin: 0;
        }

    </style>
</head>

<body>
    <section class="demo-section">
        <h2 class="content">Conteúdo</h2>
        <h2 class="units">Unidade de medida</h2>
    </section>
    <section>
        <di class="product-card">
            <img src="/assets/tenis.jpg" alt="">
            <h3 class="product-name">Tênis</h3>
            <p class="product-price">R$299</p>
            <button class="buy-button">Comprar</button>
                </div>
    </section>
</body>

</html>
