<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionament</title>

    <style>
        body {
            height: 100vh;
        }

        div {
            border: 1px;
            width: 200px;
            height: 100px;
        }

        div.estativo {
            border: 1px solid black;
            background-color: lightblue;
        }

        div.relative {
            position: relative;
            top: 20px;
            left: 30px;
            background-color: lightblue;
        }
    </style>

</head>

<body>
    <div class="estatico">
        <h1>Estático</h1>
    </div>
    <div class="relative">
        <h1>Relative</h1>
    </div>
    <div class="container">
        <h1>Absoluto</h1>
    </div>
    <div class="fixa">
        <h1>Fixa</h1>
    </div>
    <div class="sticky">
        <h1>Sticky</h1>
    </div>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Eos tempore iure, neque odio, rerum consectetur
        corporis nisi consequatur eaque corrupti fugiat soluta? Error ut debitis sit itaque, incidunt assumenda ipsam.
    </p>

</body>

</html>
